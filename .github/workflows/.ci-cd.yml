name: OSW Website CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint 
      run: npm run lint -- --max-warnings 999
      
#    - name: Run tests
#     run: npm test

#    - name: Run security audit
#      run: npm audit

    - name: Build
      run: npm run build --if-present

  security-scan:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build and push Docker image
      run: |
        docker build -t your-app-name .
        # Add commands to push to your container registry (e.g., DockerHub, GitHub Container Registry)
    
    - name: Deploy
      run: |
        # Add deployment commands here
        # This could be to Heroku, AWS, Azure, etc.
        echo "Add your deployment commands"